<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethan Tech Cafe - Cart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">
            <h2>☕ Ethan Tech Cafe</h2>
            <small>shop any Tech with pride</small>
        </div>
        <ul>
            <li><a href="index.html">🏠 Home</a></li>
            <li><a href="about.html">📖 About Us</a></li>
            <li><a href="services.html">🛠️ Services</a></li>
            <li><a href="cart.html">🛒 Cart (<span id="cartCount">0</span>)</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>🛒 Your Shopping Cart</h1>
        <div id="cartItems"></div>
        <div id="cartTotal"></div>

        <!-- Checkout Form -->
        <div id="checkoutForm" style="display: none;">
            <h2>📝 Place Order</h2>
            <form id="orderForm">
                <input type="text" id="surnameInitials" placeholder="Surname & Initials (e.g., Doe J.)" required>
                <input type="tel" id="phoneNumber" placeholder="Phone Number" required>
                <input type="email" id="emailAddress" placeholder="Email Address" required>
                <textarea id="deliveryAddress" placeholder="Delivery Address" required></textarea>
                <select id="orderMethod">
                    <option value="email">Send Order via Email</option>
                    <option value="whatsapp">Send Order via WhatsApp</option>
                </select>
                <button type="submit">Place Order</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function displayCart() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const products = JSON.parse(localStorage.getItem('products')) || [];
            const cartContainer = document.getElementById('cartItems');
            
            if (cart.length === 0) {
                cartContainer.innerHTML = '<p>Your cart is empty.</p>';
                document.getElementById('checkoutForm').style.display = 'none';
                document.getElementById('cartTotal').innerHTML = '';
                return;
            }

            let html = '<div class="cart-table">';
            let total = 0;
            
            cart.forEach(item => {
                const product = products.find(p => p.id === item.id);
                if (product) {
                    const itemTotal = product.price * item.quantity;
                    total += itemTotal;
                    html += `
                        <div class="cart-item">
                            <img src="images/${product.picture}" width="80">
                            <div class="cart-details">
                                <h3>${product.title}</h3>
                                <p>Price: R${product.price}</p>
                                <div class="quantity-controls">
                                    <button onclick="updateQuantity(${item.id}, -1)">-</button>
                                    <span>${item.quantity}</span>
                                    <button onclick="updateQuantity(${item.id}, 1)">+</button>
                                    <button onclick="removeFromCart(${item.id})" class="remove-btn">Remove</button>
                                </div>
                                <p>Subtotal: R${itemTotal.toFixed(2)}</p>
                            </div>
                        </div>
                    `;
                }
            });
            
            html += '</div>';
            cartContainer.innerHTML = html;
            document.getElementById('cartTotal').innerHTML = `<h2>Total: R${total.toFixed(2)}</h2>`;
            document.getElementById('checkoutForm').style.display = 'block';
        }

        // Update quantity in cart
        window.updateQuantity = function(productId, change) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            const itemIndex = cart.findIndex(item => item.id === productId);
            
            if (itemIndex !== -1) {
                cart[itemIndex].quantity += change;
                if (cart[itemIndex].quantity <= 0) {
                    cart.splice(itemIndex, 1);
                }
                localStorage.setItem('cart', JSON.stringify(cart));
                displayCart();
                updateCartCount();
            }
        };

        // Remove item completely
        window.removeFromCart = function(productId) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart = cart.filter(item => item.id !== productId);
            localStorage.setItem('cart', JSON.stringify(cart));
            displayCart();
            updateCartCount();
        };

        // Handle order placement
        document.getElementById('orderForm')?.addEventListener('submit', (e) => {
            e.preventDefault();
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const products = JSON.parse(localStorage.getItem('products')) || [];
            const surnameInitials = document.getElementById('surnameInitials').value;
            const phoneNumber = document.getElementById('phoneNumber').value;
            const emailAddress = document.getElementById('emailAddress').value;
            const deliveryAddress = document.getElementById('deliveryAddress').value;
            const orderMethod = document.getElementById('orderMethod').value;
            
            let orderDetails = `🛍️ NEW ORDER FROM Ethan Tech Cafe\n\n`;
            orderDetails += `Customer: ${surnameInitials}\n`;
            orderDetails += `Phone: ${phoneNumber}\n`;
            orderDetails += `Email: ${emailAddress}\n`;
            orderDetails += `Delivery Address: ${deliveryAddress}\n\n`;
            orderDetails += `ORDER ITEMS:\n`;
            
            let total = 0;
            cart.forEach(item => {
                const product = products.find(p => p.id === item.id);
                if (product) {
                    const itemTotal = product.price * item.quantity;
                    total += itemTotal;
                    orderDetails += `- ${product.title} x${item.quantity} = R${itemTotal.toFixed(2)}\n`;
                }
            });
            orderDetails += `\nTOTAL: R${total.toFixed(2)}`;
            
            if (orderMethod === 'email') {
                window.location.href = `mailto:glume3r@gmail.com?subject=New Order from ${surnameInitials}&body=${encodeURIComponent(orderDetails)}`;
            } else {
                window.location.href = `https://wa.me/27827662555?text=${encodeURIComponent(orderDetails)}`;
            }
            
            alert('Order sent! We will confirm shortly.');
            localStorage.removeItem('cart');
            displayCart();
            updateCartCount();
        });

        window.addEventListener('load', () => {
            displayCart();
            updateCartCount();
        });
    </script>
</body>
</html>
