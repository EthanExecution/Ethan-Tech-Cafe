<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethan Tech Cafe - Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav>
        <div class="logo">
            <h2>Ethan <a id="AdminLog" href="admin.html">T</a>ech Cafe</h2>☕
            <small>shop any Tech with pride</small>
        </div>
        <ul>
            <li><a href="index.html">🏠 Home</a></li>
            <li><a href="about.html">📖 About Us</a></li>
            <li><a href="services.html">🛠️ Services</a></li>
            <li><a href="cart.html" id="cartLink">🛒 Cart (<span id="cartCount">0</span>)</a></li>
        </ul>
    </nav>

    <!-- Main Products Section -->
    <div class="container">
        <h1>🔥 Our Latest Tech Products</h1>
        <div class="product-grid" id="productGrid"></div>
    </div>

    <script src="script.js"></script>
    <script>
        // Display products on homepage (read from localStorage)
        function displayHomepageProducts() {
            const products = JSON.parse(localStorage.getItem('products')) || [];
            const grid = document.getElementById('productGrid');
            
            if (products.length === 0) {
                grid.innerHTML = '<p class="no-products">No products available yet. Check back soon!</p>';
                return;
            }

            grid.innerHTML = products.map(product => `
                <div class="product-card">
                    <img src="images/${product.picture}" alt="${product.title}" onerror="this.src='https://via.placeholder.com/200'">
                    <h3>${escapeHtml(product.title)}</h3>
                    <div class="price">R${product.price.toFixed(2)}</div>
                    <div class="quantity-info">
                        ${product.quantity > 0 
                            ? `<span class="in-stock">✅ In Stock: ${product.quantity} left</span>
                               <button class="add-to-cart" data-id="${product.id}">Add to Cart 🛒</button>`
                            : `<span class="out-of-stock">❌ SOLD OUT</span>`}
                    </div>
                </div>
            `).join('');

            // Add event listeners to all "Add to Cart" buttons
            document.querySelectorAll('.add-to-cart').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const productId = parseInt(btn.dataset.id);
                    addToCart(productId);
                });
            });
        }

        // Call the function when page loads
        window.addEventListener('load', () => {
            displayHomepageProducts();
            updateCartCount();
        });
    </script>
</body>
</html>
